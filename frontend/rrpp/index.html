<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyerTrack — Mi Panel</title>
<link rel="stylesheet" href="../assets/css/base.css">
<style>
  .ranking-pos { font-size: 48px; font-weight: 800; line-height: 1; }
  .ranking-pos.top1 { color: #FFD700; }
  .ranking-pos.top2 { color: #C0C0C0; }
  .ranking-pos.top3 { color: #CD7F32; }
  .evento-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .evento-card .sala-bar { height: 3px; border-radius: 3px; margin-bottom: 16px; }
  .notif { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .update-bar { position: fixed; bottom: 16px; right: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<div class="hamburger" id="topbar">
  <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
  <span class="hamburger-title">FlyerTrack</span>
</div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar">
  <div class="sidebar-logo">
    <h1>FlyerTrack</h1>
    <span id="nombre-rrpp">Mi panel</span>
  </div>
  <a class="nav-item active" onclick="showPage('mis-eventos')">
    <span class="icon">📊</span> Mis eventos
  </a>
  <a class="nav-item" onclick="showPage('historico')">
    <span class="icon">📁</span> Historial
  </a>
  <a class="nav-item" onclick="showPage('notificaciones')">
    <span class="icon">🔔</span> Notificaciones
  </a>
  <div class="theme-toggle">
    <button class="btn" onclick="toggleTheme()" style="width:100%;justify-content:center">
      <span id="tema-icon">☀️</span> Cambiar tema
    </button>
    <button class="btn btn-danger" onclick="handleLogout()" style="width:100%;justify-content:center;margin-top:8px">
      Cerrar sesión
    </button>
  </div>
</div>

<div class="main">
  <div id="alert-container"></div>

  <div class="page active" id="page-mis-eventos">
    <div class="page-title">Mis eventos activos</div>
    <div id="mis-eventos-container"><div class="loading">Cargando...</div></div>
  </div>

  <div class="page" id="page-historico">
    <div class="page-title">Mi historial</div>
    <div class="card">
      <table>
        <thead><tr><th>Evento</th><th>Sala</th><th>Fecha</th><th>Flyers</th><th>Activados</th><th>Válidos</th><th>Tasa</th></tr></thead>
        <tbody id="tabla-historico"></tbody>
      </table>
    </div>
  </div>

  <div class="page" id="page-notificaciones">
    <div class="page-title">Notificaciones</div>
    <div id="notificaciones-container"></div>
  </div>
</div>

<div class="update-bar">
  <span class="dot-green pulse" id="polling-dot"></span>
  <span id="ultima-actualizacion">Actualizando...</span>
</div>

<script src="../assets/js/api.js"></script>
<script>

const toggleSidebar = () => {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
};

if (!api.isLoggedIn()) window.location.href = '../login.html';
const roleToken = JSON.parse(atob(api.token.split('.')[1])).rol;
if (roleToken !== 'rrpp') window.location.href = '../login.html';

const notifications = [];
let pollingInterval = null;

const showPage = (name) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'historico') loadHistory();
  if (name === 'notificaciones') renderNotifications();
};

const toggleTheme = () => {
  const html = document.documentElement;
  const actual = html.getAttribute('data-theme');
  html.setAttribute('data-theme', actual === 'dark' ? 'light' : 'dark');
  document.getElementById('tema-icon').textContent = actual === 'dark' ? '🌙' : '☀️';
};

const handleLogout = async () => { await api.logout(); window.location.href = '../login.html'; };

const roomColors = { velvet: '#D4537E', lemon: '#EFB827', zrrcus: '#E8732A' };

const posClass = (pos) => pos === 1 ? 'top1' : pos === 2 ? 'top2' : pos === 3 ? 'top3' : '';

const loadMyEvents = async () => {
  try {
    const data = await api.get('/api/panel/rrpp');
    const nameToken = JSON.parse(atob(api.token.split('.')[1])).nombre;
    document.getElementById('nombre-rrpp').textContent = nameToken;

    const activeEvents = data.eventos.filter(e => e.estado === 'activo');

    if (activeEvents.length === 0) {
      document.getElementById('mis-eventos-container').innerHTML = '<div class="empty">No tienes eventos activos ahora mismo</div>';
      return;
    }

    document.getElementById('mis-eventos-container').innerHTML = activeEvents.map(e => {
      const rate = e.total_qrs > 0 ? Math.round(e.flyers_activados / e.total_qrs * 100) : 0;
      return `
        <div class="evento-card">
          <div class="sala-bar" style="background:${roomColors[e.sala]}"></div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
            <div>
              <div style="font-size:18px;font-weight:700">${escapeHtml(e.nombre)}</div>
              <div style="color:var(--text3);font-size:13px;margin-top:2px">${formatDate(e.fecha)} — ${escapeHtml(e.lugar || '')}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Tu posición</div>
              <div class="ranking-pos ${posClass(e.posicion)}">${e.posicion}º</div>
              <div style="font-size:11px;color:var(--text3)">de ${e.total} RRPPs</div>
            </div>
          </div>
          <div class="cards-grid" style="grid-template-columns:repeat(4,1fr)">
            <div class="stat-card" style="padding:14px">
              <div class="label">Tu código</div>
              <div style="font-size:18px;font-weight:800;color:${roomColors[e.sala]};letter-spacing:2px">${escapeHtml(e.codigo_descuento)}</div>
            </div>
            <div class="stat-card" style="padding:14px">
              <div class="label">Flyers activados</div>
              <div class="value">${e.flyers_activados}</div>
              <div class="sub">de ${e.total_qrs} repartidos</div>
            </div>
            <div class="stat-card" style="padding:14px">
              <div class="label">Escaneos válidos</div>
              <div class="value">${e.escaneos_validos}</div>
            </div>
            <div class="stat-card" style="padding:14px">
              <div class="label">Tasa activación</div>
              <div class="value" style="color:${rate >= 50 ? 'var(--success)' : rate >= 25 ? 'var(--warning)' : 'var(--danger)'}">${rate}%</div>
            </div>
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;font-size:12px;color:var(--text3)">
            <span>📱 Físicos: ${e.escaneos_fisicos}</span>
            <span>🔗 Por enlace: ${e.escaneos_enlace}</span>
          </div>
        </div>
      `;
    }).join('');

    checkAchievements(activeEvents);
    document.getElementById('ultima-actualizacion').textContent = `Actualizado ${formatDateTime(new Date().toISOString())}`;

  } catch(e) { showAlert(e.message); }
};

const loadHistory = async () => {
  try {
    const data = await api.get('/api/panel/rrpp');
    document.getElementById('tabla-historico').innerHTML = data.historico.length
      ? data.historico.map(h => {
          const rate = h.total_flyers > 0 ? Math.round(h.flyers_activados / h.total_flyers * 100) : 0;
          return `<tr>
  	    <td><div style="display:flex;align-items:center;gap:8px"><strong>${escapeHtml(h.evento_nombre)}</strong>${statusBadge(h.sala_estado || 'cerrado')}</div></td>
            <td>${roomBadge(h.sala)}</td>
  	    <td>${formatDate(h.fecha)}</td>
	    <td>${h.total_flyers}</td>
  	    <td>${h.flyers_activados}</td>
  	    <td>${h.total_escaneos}</td>
  	    <td><strong style="color:var(--success)">${rate}%</strong></td>
	  </tr>`;
        }).join('')
      : '<tr><td colspan="7" class="empty">Sin historial todavía</td></tr>';
  } catch(e) { showAlert(e.message); }
};

const checkAchievements = (events) => {
  events.forEach(e => {
    const milestones = [1, 5, 10, 25, 50, 100];
    milestones.forEach(n => {
      if (e.flyers_activados === n) {
        const key = `logro_${e.id}_${n}`;
        if (!localStorage.getItem(key)) {
          localStorage.setItem(key, '1');
          notifications.unshift({
            emoji: '🎉',
            text: `¡Conseguiste ${n} flyer${n > 1 ? 's' : ''} activado${n > 1 ? 's' : ''} en ${e.nombre}!`,
            time: new Date().toISOString()
          });
        }
      }
    });

    if (e.posicion === 1) {
      const key = `logro_lider_${e.id}`;
      if (!localStorage.getItem(key)) {
        localStorage.setItem(key, '1');
        notifications.unshift({
          emoji: '🏆',
          text: `¡Eres el número 1 en ${e.nombre}! Sigue así.`,
          time: new Date().toISOString()
        });
      }
    }
  });
};

const renderNotifications = () => {
  const container = document.getElementById('notificaciones-container');
  if (notifications.length === 0) {
    container.innerHTML = '<div class="empty">Sin notificaciones por ahora. ¡Reparte flyers!</div>';
    return;
  }
  container.innerHTML = notifications.map(n => `
    <div class="notif">
      <span style="font-size:20px">${n.emoji}</span>
      <div>
        <div>${escapeHtml(n.text)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${formatDateTime(n.time)}</div>
      </div>
    </div>
  `).join('');
};

pollingInterval = setInterval(loadMyEvents, 30000);
loadMyEvents();
</script>
</body>
</html>
